<div class="modal fade ticket-modal" id="ticketDetailsModal" tabindex="-1" aria-labelledby="ticketDetailsModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable modal-xl ticket-modal__dialog">
        <div class="modal-content ticket-modal__content">
            <div class="modal-header ticket-modal__header">
                <div class="ticket-modal__heading">
                    <span class="ticket-modal__eyebrow">Detalhes do chamado</span>
                    <div class="ticket-modal__number" id="ticketModalNumber">INC-0000</div>
                    <h2 class="ticket-modal__title" id="ticketDetailsModalLabel">Titulo do chamado</h2>
                </div>

                <button type="button" class="btn-close ticket-modal__close" data-bs-dismiss="modal" aria-label="Fechar"></button>
            </div>

            <div class="modal-body ticket-modal__body">
                <section class="ticket-modal__summary-grid">
                    <article class="ticket-modal__summary-card">
                        <span class="ticket-modal__summary-label">Prioridade</span>
                        <strong id="ticketModalPriority" class="ticket-modal__pill">-</strong>
                    </article>
                    <article class="ticket-modal__summary-card">
                        <span class="ticket-modal__summary-label">Status</span>
                        <strong id="ticketModalStatus" class="ticket-modal__pill">-</strong>
                    </article>
                    <article class="ticket-modal__summary-card">
                        <span class="ticket-modal__summary-label">Tempo aberto</span>
                        <strong id="ticketModalTimeOpen">-</strong>
                    </article>
                    <article class="ticket-modal__summary-card">
                        <span class="ticket-modal__summary-label">Origem</span>
                        <strong id="ticketModalSource">-</strong>
                    </article>
                </section>

                <div class="ticket-modal__layout">
                    <section class="ticket-modal__main">
                        <article class="ticket-modal__panel">
                            <div class="ticket-modal__panel-header">
                                <h3>Descricao completa</h3>
                            </div>
                            <p class="ticket-modal__description" id="ticketModalDescription">-</p>
                        </article>

                        <article class="ticket-modal__panel">
                            <div class="ticket-modal__panel-header">
                                <h3>Historico e comentarios</h3>
                            </div>
                            <div class="ticket-modal__timeline" id="ticketModalHistory"></div>
                        </article>
                    </section>

                    <aside class="ticket-modal__aside">
                        <article class="ticket-modal__panel">
                            <div class="ticket-modal__panel-header">
                                <h3>Informacoes principais</h3>
                            </div>

                            <dl class="ticket-modal__details">
                                <div>
                                    <dt>Solicitante</dt>
                                    <dd id="ticketModalRequester">-</dd>
                                </div>
                                <div>
                                    <dt>E-mail</dt>
                                    <dd id="ticketModalRequesterEmail">-</dd>
                                </div>
                                <div>
                                    <dt>Departamento</dt>
                                    <dd id="ticketModalDepartment">-</dd>
                                </div>
                                <div>
                                    <dt>Categoria</dt>
                                    <dd id="ticketModalCategory">-</dd>
                                </div>
                                <div>
                                    <dt>Subcategoria</dt>
                                    <dd id="ticketModalSubcategory">-</dd>
                                </div>
                                <div>
                                    <dt>Atendente responsavel</dt>
                                    <dd id="ticketModalResponsible">-</dd>
                                </div>
                                <div>
                                    <dt>Abertura</dt>
                                    <dd id="ticketModalOpenedAt">-</dd>
                                </div>
                                <div>
                                    <dt>Ultima atualizacao</dt>
                                    <dd id="ticketModalLastUpdate">-</dd>
                                </div>
                            </dl>
                        </article>

                        <article class="ticket-modal__panel">
                            <div class="ticket-modal__panel-header">
                                <h3>Anexos</h3>
                            </div>
                            <div class="ticket-modal__attachments" id="ticketModalAttachments"></div>
                        </article>
                    </aside>
                </div>
            </div>

            <div class="modal-footer ticket-modal__footer">
                <button type="button" class="btn btn-light ticket-modal__footer-btn" data-bs-dismiss="modal">Fechar</button>
            </div>
        </div>
    </div>
</div>
