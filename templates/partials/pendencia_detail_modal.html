<div class="modal fade" id="pendenciaDetailModal" tabindex="-1" aria-labelledby="pendenciaDetailModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content create-ticket-modal">
            <div class="modal-header">
                <div>
                    <span class="create-ticket-kicker">Pendencia</span>
                    <h5 class="modal-title" id="pendenciaDetailModalLabel" data-pendencia-detail="titulo">Pendencia</h5>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
            </div>

            <div class="modal-body">
                <div class="pendencia-detail__meta">
                    <span>Criado por <strong data-pendencia-detail="criado_por">-</strong></span>
                    <span data-pendencia-detail="criado_em">-</span>
                </div>
                <p class="pendencia-detail__descricao" data-pendencia-detail="descricao"></p>

                <div class="pendencia-detail__priority">
                    <span class="pendencia-detail__priority-label">Prioridade</span>
                    <div class="pendencia-priority" data-pendencia-priority role="radiogroup" aria-label="Prioridade da pendencia">
                        {% for op in pendencia_prioridades %}
                        <button type="button"
                            class="pendencia-priority__swatch"
                            style="--swatch-cor: {{ op.cor }};"
                            data-priority-value="{{ op.valor }}"
                            role="radio"
                            aria-checked="false"
                            title="{{ op.rotulo }}"
                            aria-label="{{ op.rotulo }}"></button>
                        {% endfor %}
                    </div>
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-outline-danger me-auto" data-pendencia-delete>Excluir</button>
                <span class="pendencia-detail__confirm" data-pendencia-delete-confirm hidden>
                    <span class="pendencia-detail__confirm-text">Excluir esta pendencia?</span>
                    <button type="button" class="btn btn-light btn-sm" data-pendencia-delete-cancel>Cancelar</button>
                    <button type="button" class="btn btn-danger btn-sm" data-pendencia-delete-yes>Excluir definitivamente</button>
                </span>
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">Fechar</button>
            </div>
        </div>
    </div>
</div>
