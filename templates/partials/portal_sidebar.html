{% comment %}
Sidebar reutilizavel do Portal do Solicitante.
Uso: {% include "partials/portal_sidebar.html" with active="meus" %}
Valores de active: "meus", "novo".
{% endcomment %}
<aside class="tickets-sidebar">
    <div class="sidebar-brand sidebar-brand--compact">
        <div class="system-mark">TI</div>
        <button type="button" class="sidebar-toggle" data-sidebar-toggle aria-label="Abrir menu" aria-expanded="false">
            <span class="sidebar-toggle__bar"></span>
            <span class="sidebar-toggle__bar"></span>
            <span class="sidebar-toggle__bar"></span>
        </button>
    </div>

    <nav class="sidebar-menu">
        <a href="{% url 'my_tickets' %}" class="menu-link{% if active == 'meus' %} active{% endif %}">
            <svg class="menu-link__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M8 6h11M8 12h11M8 18h11"></path>
                <path d="M3.5 6h.01M3.5 12h.01M3.5 18h.01"></path>
            </svg>
            <span>Meus Chamados</span>
        </a>
        <a href="{% url 'open_ticket' %}" class="menu-link{% if active == 'novo' %} active{% endif %}">
            <svg class="menu-link__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 5v14M5 12h14"></path>
            </svg>
            <span>Abrir Chamado</span>
        </a>
    </nav>

    <div class="sidebar-footer">
        <span class="sidebar-user-name">{{ request.user.get_full_name|default:request.user.username }}</span>
        <a href="{% url 'logout' %}" class="btn btn-light sidebar-logout">Sair</a>
    </div>
</aside>
