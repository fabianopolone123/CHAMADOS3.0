<div class="modal fade" id="createEmprestimoModal" tabindex="-1" aria-labelledby="createEmprestimoModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content create-ticket-modal emprestimo-form-modal">
            <div class="modal-header">
                <div>
                    <span class="create-ticket-kicker">Emprestimos</span>
                    <h5 class="modal-title" id="createEmprestimoModalLabel">Novo emprestimo</h5>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
            </div>

            <form id="createEmprestimoForm" class="create-ticket-form" enctype="multipart/form-data">
                <div class="modal-body emprestimo-form__body">
                    <h6 class="emprestimo-form__section">Dados do colaborador</h6>
                    <div class="emprestimo-form__grid">
                        <label class="contrato-field contrato-field--full">
                            <span>Nome do colaborador</span>
                            <input type="text" class="form-control" name="colaborador_nome" maxlength="255" required>
                        </label>
                        <label class="contrato-field">
                            <span>Empresa</span>
                            <input type="text" class="form-control" name="empresa" maxlength="255">
                        </label>
                        <label class="contrato-field">
                            <span>CPF</span>
                            <input type="text" class="form-control" name="cpf" maxlength="40">
                        </label>
                        <label class="contrato-field">
                            <span>E-mail</span>
                            <input type="email" class="form-control" name="email" maxlength="254">
                        </label>
                        <label class="contrato-field">
                            <span>Telefone</span>
                            <input type="text" class="form-control" name="telefone" maxlength="40">
                        </label>
                        <label class="contrato-field">
                            <span>Data do emprestimo</span>
                            <input type="date" class="form-control" name="data_emprestimo" required>
                        </label>
                        <label class="contrato-field">
                            <span>Previsao de devolucao</span>
                            <input type="date" class="form-control" name="previsao_devolucao">
                            <small class="contrato-field__help">Em branco = devolucao indeterminada.</small>
                        </label>
                        <label class="contrato-field contrato-field--full">
                            <span>Observacoes internas</span>
                            <textarea class="form-control" name="observacoes_internas" rows="2"></textarea>
                        </label>
                    </div>

                    <h6 class="emprestimo-form__section">Assinatura do responsavel TI</h6>
                    <div class="emprestimo-form__grid">
                        <label class="contrato-field">
                            <span>Assinatura cadastrada</span>
                            <select class="form-select" name="assinatura_id" id="emprestimoAssinatura">
                                <option value="">Sem assinatura</option>
                                {% for a in assinaturas %}
                                    <option value="{{ a.id }}">{{ a.nome_responsavel }}</option>
                                {% endfor %}
                            </select>
                        </label>
                        <label class="contrato-field">
                            <span>Senha de autorizacao</span>
                            <input type="password" class="form-control" name="senha_assinatura" autocomplete="new-password">
                            <small class="contrato-field__help">Obrigatoria para aplicar a assinatura no termo.</small>
                        </label>
                    </div>

                    <div class="emprestimo-form__equip-head">
                        <h6 class="emprestimo-form__section mb-0">Equipamentos emprestados</h6>
                        <button type="button" class="btn btn-sm btn-outline-primary" id="addEquipamentoButton">+ Adicionar mais um equipamento</button>
                    </div>
                    <div id="equipamentosContainer"></div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary" id="createEmprestimoSubmit">Cadastrar e gerar termo</button>
                </div>
            </form>
        </div>
    </div>
</div>

{# Template de bloco de equipamento (clonado pelo JS; __I__ vira o indice) #}
<template id="equipamentoTemplate">
    <div class="equipamento-bloco" data-equip-bloco>
        <div class="equipamento-bloco__head">
            <strong data-equip-titulo>Equipamento</strong>
            <button type="button" class="btn btn-sm btn-link text-danger p-0" data-remove-equip>Remover</button>
        </div>
        <div class="emprestimo-form__grid">
            <label class="contrato-field">
                <span>Tipo de equipamento</span>
                <input type="text" class="form-control" name="equip___I___tipo" maxlength="255">
            </label>
            <label class="contrato-field">
                <span>Marca</span>
                <input type="text" class="form-control" name="equip___I___marca" maxlength="255">
            </label>
            <label class="contrato-field">
                <span>Modelo</span>
                <input type="text" class="form-control" name="equip___I___modelo" maxlength="255">
            </label>
            <label class="contrato-field">
                <span>Numero de serie</span>
                <input type="text" class="form-control" name="equip___I___serie" maxlength="255">
            </label>
            <label class="contrato-field">
                <span>Patrimonio / etiqueta</span>
                <input type="text" class="form-control" name="equip___I___patrimonio" maxlength="255">
            </label>
            <label class="contrato-field">
                <span>Acessorios entregues</span>
                <input type="text" class="form-control" name="equip___I___acessorios" maxlength="255">
            </label>
            <label class="contrato-field contrato-field--full">
                <span>Fotos do equipamento</span>
                <input type="file" class="form-control" name="equip___I___fotos" accept="image/*" multiple>
            </label>
        </div>
    </div>
</template>
